; ──────────────────────────────────────────────────
; Overrides PHP-FPM pour vipgpi.net (production)
; ──────────────────────────────────────────────────

; Désactive XDebug complètement (xdebug 3.x)
; Sans ça, xdebug ajoute 50-100% d'overhead sur chaque requête
xdebug.mode = off

; Augmente la mémoire pour Filament/Livewire
memory_limit = 256M

; Augmente la taille max des uploads pour l'admin
upload_max_filesize = 20M
post_max_size = 25M

; Augmente le temps max d'exécution (utile pour les imports)
max_execution_time = 60
max_input_time = 60

; ── OPcache ─────────────────────────────────────────
opcache.enable = 1
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 32
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 1
opcache.revalidate_freq = 120
opcache.save_comments = 1
opcache.enable_file_override = 1

; ── JIT ─────────────────────────────────────────────
; Active le JIT (Just-In-Time compilation) PHP 8.x
; Gain de 10-30% sur le code CPU-intensif (Blade, routing, etc.)
opcache.jit = tracing
opcache.jit_buffer_size = 64M

; ── Realpath cache ──────────────────────────────────
; Laravel charge des centaines de fichiers: un cache realpath plus gros
; évite des milliers d'appels stat() au filesystem
realpath_cache_size = 4096K
realpath_cache_ttl = 600
